name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Check [open issues](https://github.com/TheKrowi/Krowi_AchievementFilter/issues) first to avoid duplicates. You can also discuss ideas on the [Discord](https://discord.gg/AaqZnCMkFR).

  - type: dropdown
    id: game_type
    attributes:
      label: WoW Client
      description: Which client(s) would this feature apply to?
      options:
        - Retail (mainline)
        - Classic (all versions)
        - Both Retail and Classic
        - Not client-specific
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem It Solves
      description: What is the motivation? What workflow or pain point does this address?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried any workarounds, or considered other ways to solve the problem?
    validations:
      required: false
